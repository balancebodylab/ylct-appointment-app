<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP 預約系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    /* --- CSS 樣式區 --- */
    :root { 
      --primary: #246A53;   /* 獵人深綠 */
      --accent: #F0C239;    /* 品牌金黃 */
      --bg-white: #ffffff;  /* 純白背景 */
      --brown: #A88462;     /* 暖棕輔助 */
      --danger: #A73520;    /* 警示深紅 */
    }

    body { 
      margin: 0; padding: 0; 
      font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
      background: var(--bg-white); 
      color: #333; 
    }

    .container { 
      max-width: 600px; 
      margin: 0 auto; 
      min-height: 100vh; 
      background: var(--accent); 
      padding-bottom: 50px; 
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    .view { display: none !important; padding: 20px; }
    .view.active { display: block !important; }
    
    .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight:bold; cursor: pointer; margin-top: 10px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .btn:active { transform: scale(0.98); opacity: 0.9; }

    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    
    #loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:99; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .member-card { background: linear-gradient(135deg, #246A53, #1a4f3d); color: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    
    .member-info-row { margin-bottom: 8px; font-size: 15px; }
    .member-info-label { opacity: 0.9; font-size: 14px; }
    .member-info-val { font-weight: bold; font-size: 16px; color: #F0C239; margin-left: 5px; }

    .option-card { 
      border: 2px solid #fff; 
      padding: 15px; 
      margin-bottom: 10px; 
      border-radius: 10px; 
      cursor: pointer; 
      background: #fff; 
      transition: 0.3s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .option-card.selected { 
      border: 3px solid var(--primary); 
      background: #fff; 
    }

    .option-card:not(.selected) { opacity: 0.7; transform: scale(0.98); }
    .option-card:not(.selected) select, 
    .option-card:not(.selected) input { 
      pointer-events: none; 
      background: #f9f9f9; 
    }

    .plan-select {
      width: 100%; padding: 10px; margin-top: 5px; 
      border: 1px solid var(--brown); border-radius: 8px; 
      font-size: 16px; background: #fff;
    }

    .ticket-box {
      margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ccc;
      display: flex; align-items: center;
    }
    .ticket-box label { display: flex; align-items: center; cursor: pointer; width: 100%; }
    .ticket-box input[type="checkbox"] { width: 20px; height: 20px; margin: 0 10px 0 0; cursor: pointer; }

    .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
    
    .time-slot { 
      padding: 10px; 
      background: #fff;           
      border: 2px solid var(--primary); 
      color: var(--primary);      
      border-radius: 8px; 
      text-align: center; 
      cursor: pointer; 
      font-weight: bold;
    }
    .time-slot.selected { 
      background: var(--primary); 
      color: #fff;                
      box-shadow: 0 0 8px rgba(36, 106, 83, 0.5);
      border-color: var(--primary);
    }
  
    .booking-item {
      background: #fff; border-left: 6px solid var(--primary);
      padding: 15px; margin-bottom: 10px; border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center;
    }
    .booking-info { font-size: 14px; display: flex; flex-direction: column; }
    .booking-title { font-weight: bold; color: #333; font-size: 16px; margin-bottom: 4px; }
    .booking-date { color: var(--primary); font-size: 14px; }

    .cancel-btn {
      background: var(--danger); color: white; border: none; padding: 8px 12px;
      border-radius: 5px; cursor: pointer; font-size: 13px; margin-left: 10px;
    }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-text">資料傳輸中...</div>
</div>

<div class="container">
  
  <div id="view-login" class="view active" style="display:flex; flex-direction:column; justify-content:center; min-height:80vh;">
    <div style="background:#fff; padding:30px; border-radius:20px; box-shadow:0 10px 20px rgba(0,0,0,0.1);">
      <img src="./images/Logo.PNG" 
           alt="筋摩獵人 Logo" 
           style="width: 140px; height: auto; display: block; margin: 0 auto 15px auto; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.15));">

      <div id="status-msg" style="text-align:center; color: #A88462; font-size: 13px; font-weight: bold; margin-bottom: 20px;">
        <span class="spinner" style="width:12px; height:12px; border-width:2px; display:inline-block; vertical-align:middle;"></span> 
        連線中...
      </div>

      <h2 style="text-align:center; color: var(--primary); margin: 0 0 10px 0;">VIP 會員登入</h2>

      <div style="margin: 20px 0;">
        <input type="tel" id="loginPhone" placeholder="輸入手機號碼" 
               style="text-align: center; font-size: 18px; letter-spacing: 1px; padding: 15px; border: 2px solid #ddd; width:100%;">
      </div>

      <button class="btn" onclick="handleLogin()" style="font-size: 18px;">查詢 / 登入</button>
    </div>
  </div> 

  <div id="view-main" class="view">
    <div class="member-card">
      <h3>Hi, <span id="userName">--</span></h3>
      
      <div class="member-info-row">
        <span class="member-info-label">課程名稱：</span>
        <span id="ui-plan-text" class="member-info-val">--</span>
      </div>
      
      <div class="member-info-row">
        <span class="member-info-label">剩餘課程：</span>
        <span class="member-info-val"><span id="ui-course-balance">0</span> 堂</span>
      </div>

      <div class="member-info-row">
        <span class="member-info-label">結構調整30分鐘抵用卷：</span>
        <span class="member-info-val"><span id="ui-ticket-balance">0</span> 張</span>
      </div>
    </div>
    
    <div id="history-section" style="margin-bottom: 20px; display:none;">
      <h3 style="color:#333; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 10px;">📅 我的預約</h3>
      <div id="bookingList"></div>
    </div>

    <h3 style="color:#333;">選擇預約項目</h3>
    
    <div id="opt-course" class="option-card" onclick="selectOption('COURSE')">
      <b id="ui-course-btn-text" style="color:var(--primary);">💎 使用課程 (--分)</b>
      
      <div style="margin-top:5px;">
        <label style="font-size:14px; color:#555;">選擇堂數：</label>
        <select id="coursePlanSelect" class="plan-select" onchange="updateCoursePlanLogic()" onclick="event.stopPropagation()">
          <option value="1">🌿 1 堂課</option>
          <option value="2">🌿🌿 2 堂課</option>
        </select>

        <div class="ticket-box">
          <label>
            <input type="checkbox" id="courseUseTicket" onclick="event.stopPropagation(); updateCoursePlanLogic()"> 
            使用結構調整抵用卷 (+30分)
          </label>
        </div>
        <div id="courseTicketHint" style="font-size:12px; color:var(--danger); display:none; margin-top:5px;">
          ⚠️ 連續兩堂課不可使用抵用卷
        </div>
      </div>
    </div>

    <div id="opt-single" class="option-card" onclick="selectOption('SINGLE')">
      <b style="color:var(--primary);">💰 單次付費預約</b>
      
      <div style="margin-top:10px;">
        <label style="font-size:14px; color:#555;">選擇方案：</label>
        <select id="singlePlanSelect" class="plan-select" onchange="updateSinglePlanLogic()" onclick="event.stopPropagation()">
          <option value="50_1">🌿 50分鐘 (單堂)</option>
          <option value="50_2">🌿🌿 50分鐘 (連續兩堂)</option>
          <option value="80_1">🔥 80分鐘 (單堂)</option>
        </select>
        
        <div class="ticket-box">
          <label>
            <input type="checkbox" id="singleUseTicket" onchange="updateSinglePlanLogic()" onclick="event.stopPropagation()"> 
            使用結構調整抵用卷 (+30分)
          </label>
        </div>
        <div id="singleTicketHint" style="font-size:12px; color:var(--danger); display:none; margin-top:5px;">
          ⚠️ 此方案不可使用抵用卷
        </div>
      </div>
    </div>

    <div id="time-section" style="display:none; margin-top:20px; background:#fff; padding:15px; border-radius:10px;">
      <h3 style="margin-top:0;">選擇時間 (<span id="finalDuration">0</span>分鐘)</h3>
      <input type="date" id="datePicker" onchange="fetchSlots()" style="background:#f9f9f9;">
      <div id="slotsContainer" class="time-grid"></div>
    </div>
    
    <button id="confirmBtn" class="btn" style="display:none; margin-top:20px; box-shadow:0 0 15px rgba(0,0,0,0.2);" onclick="submitBooking()">確認預約</button>
    <button onclick="logoutAndClear()" style="width:100%; border:none; background:none; color:#555; margin-top:30px; cursor:pointer; padding:10px;"> 登出</button>
  </div> 
</div>

<script>
  // ==========================================
  // 【請確認】您的 GAS 網址與 LIFF ID
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwcGU8Sjw1feT6J-clxiDlUSEEzjahIFg_lMR64RlLqKwVH4-zqMty9z7Nk6IK8e2O7Mg/exec";
  const MY_LIFF_ID = '2008933800-UrZptDbA'; 
  // ==========================================

  // --- 全域變數 ---
  let currentUser = {};
  let lineUserId = '';
  let selectedPlan = '';
  let occupiedDuration = 0; 
  let displayDuration = 0;  
  let useTicket = false;
  let selectedTime = null;
  let finalPlanDetailName = ""; 
  let currentBookingList = []; // 預約列表 (Runtime Cache)
  
  // 快取設定 (5分鐘)
  const CACHE_DURATION = 5 * 60 * 1000; 

  // --- 初始化 ---
  window.onload = function() {
    liff.init({ liffId: MY_LIFF_ID }).then(() => {
      if (liff.isLoggedIn()) {
        liff.getProfile().then(p => {
          lineUserId = p.userId;
          document.getElementById('status-msg').innerText = `Hello: ${p.displayName}`;
        });
      } else {
        liff.login();
      }
    }).catch(e => {
      document.getElementById('status-msg').innerText = "LIFF 初始化失敗 (請檢查 ID)";
    });
    
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    document.getElementById('datePicker').min = `${yyyy}-${mm}-${dd}`;
  };

  // --- API 請求 ---
  function sendRequest(action, data) {
    document.getElementById('loading-overlay').style.display = 'flex';
    data.action = action;
    return fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) })
      .then(res => res.json())
      .then(response => {
        document.getElementById('loading-overlay').style.display = 'none';
        return response;
      })
      .catch(err => {
        document.getElementById('loading-overlay').style.display = 'none';
        Swal.fire('連線錯誤', '網路忙碌中，請稍後重試', 'error');
        console.error(err);
        throw err;
      });
  }

  // --- 登入邏輯 (含快取與清空) ---
  function handleLogin() {
    const phone = document.getElementById('loginPhone').value;
    if(!phone) return Swal.fire('提示', '請輸入手機號碼', 'warning');

    // 每次登入前，強制清空所有舊 Runtime 資料
    currentBookingList = []; 
    document.getElementById('bookingList').innerHTML = '';

    // 檢查快取
    const cachedData = getLocalUserData(phone);
    if (cachedData) {
      console.log("⚡️ 使用本機快取資料");
      currentUser = cachedData;
      renderMain();             
      loadBookingHistory();     
      return;                   
    }

    console.log("🐢 發送網路請求...");
    sendRequest('loginUser', { phone: phone }).then(res => {
      if(res.success) {
        saveLocalUserData(phone, res.user); // 寫入快取
        currentUser = res.user;
        renderMain(); 
        loadBookingHistory(); 
      } else {
        if(!res.success && res.user) { 
          Swal.fire('提示', res.message || '歡迎新朋友', 'info');
          currentUser = res.user; 
          renderMain(); 
          loadBookingHistory(); 
        } else {
          Swal.fire('錯誤', '登入失敗', 'error');
        }
      }
    });
  }

  // --- 快取輔助函式 ---
  function getLocalUserData(phone) {
    const key = 'vip_user_' + phone;
    const jsonStr = localStorage.getItem(key);
    if (!jsonStr) return null; 
    try {
      const data = JSON.parse(jsonStr);
      const now = new Date().getTime();
      if (now - data.timestamp > CACHE_DURATION) {
        localStorage.removeItem(key); 
        return null;
      }
      return data.user; 
    } catch (e) { return null; }
  }

  function saveLocalUserData(phone, userObj) {
    const key = 'vip_user_' + phone;
    const data = { timestamp: new Date().getTime(), user: userObj };
    localStorage.setItem(key, JSON.stringify(data));
  }

  // --- 登出並清除快取 ---
  function logoutAndClear() {
    if (currentUser && currentUser.phone) {
      localStorage.removeItem('vip_user_' + currentUser.phone);
    }
    location.reload();
  }

  // --- 主畫面渲染 ---
  function renderMain() {
    document.getElementById('userName').innerText = currentUser.name;
    document.getElementById('ui-course-balance').innerText = currentUser.courseBalance || currentUser.courses || 0;
    document.getElementById('ui-ticket-balance').innerText = currentUser.ticketBalance || currentUser.tickets || 0;

    let rawPlanName = currentUser.planName || ""; 
    let extractedDuration = 50; 
    const match = rawPlanName.match(/(\d+)\s*(分鐘|分|min)/i);
    if (match) {
        extractedDuration = parseInt(match[1]);
    } else if (currentUser.plan) {
        extractedDuration = parseInt(currentUser.plan);
    }
    currentUser.parsedDuration = extractedDuration;

    document.getElementById("ui-plan-text").innerText = rawPlanName || "未設定方案";
    document.getElementById("ui-course-btn-text").innerHTML = `💎 使用課程 (${extractedDuration}分)`;

    const hasCourse = (currentUser.courseBalance > 0 || currentUser.courses > 0);
    const hasTicket = (currentUser.ticketBalance > 0 || currentUser.tickets > 0);
    
    const cDiv = document.getElementById('opt-course');
    if(!hasCourse) { 
      cDiv.style.opacity = '0.5'; cDiv.style.pointerEvents = 'none'; 
      cDiv.innerHTML += '<br><span style="color:red;font-size:12px;">(點數不足)</span>';
    } else { 
      cDiv.style.opacity = '1'; cDiv.style.pointerEvents = 'auto'; 
    }
    
    const tCheckCourse = document.getElementById('courseUseTicket');
    const tCheckSingle = document.getElementById('singleUseTicket');

    if(!hasTicket) { 
      tCheckCourse.disabled = true; tCheckCourse.checked = false; 
      tCheckSingle.disabled = true; tCheckSingle.checked = false; 
    } else { 
      tCheckCourse.disabled = false;
      tCheckSingle.disabled = false;
    }

    document.getElementById('view-login').classList.remove('active');
    document.getElementById('view-main').classList.add('active');
  }

  // --- 選單與計算邏輯 ---
  function selectOption(type) {
    selectedPlan = type;
    document.querySelectorAll('.option-card').forEach(e => e.classList.remove('selected'));
    
    document.getElementById('courseUseTicket').checked = false;
    document.getElementById('singleUseTicket').checked = false;
    useTicket = false;
    
    // 切換方案時重置選單
    resetSelection();

    if(type === 'COURSE') {
       document.getElementById('opt-course').classList.add('selected');
       updateCoursePlanLogic(); 
    } else {
       document.getElementById('opt-single').classList.add('selected');
       updateSinglePlanLogic();
    }
  }

  // --- 【功能】重置選單函式 ---
  function resetSelection() {
    selectedTime = null;
    document.getElementById('datePicker').value = ''; 
    document.getElementById('slotsContainer').innerHTML = ''; 
    document.getElementById('confirmBtn').style.display = 'none'; 
    document.getElementById('time-section').style.display = 'none'; 
  }

  function updateCoursePlanLogic() {
    if(selectedPlan !== 'COURSE') return;
    const select = document.getElementById('coursePlanSelect');
    const ticketCheck = document.getElementById('courseUseTicket');
    const ticketHint = document.getElementById('courseTicketHint');
    
    let baseDuration = currentUser.parsedDuration || 50; 
    let val = select.value; 
    let isTicket = ticketCheck.checked;
    
    let serviceTime = 0, bufferTime = 0, ticketTime = 0;
    let planText = "";
    const hasTicket = (currentUser.ticketBalance > 0 || currentUser.tickets > 0);

    // ▼▼▼ 修改重點：改回使用固定的 "課程扣抵" 文字 ▼▼▼
    if (val === '1') {
      planText = `課程扣抵 (1堂 ${baseDuration}分)`; // 不再顯示 2025新年優惠...

      if(hasTicket) { ticketCheck.disabled = false; ticketCheck.parentElement.style.opacity = "1"; }
      ticketHint.style.display = "none";
      if(isTicket) { serviceTime = baseDuration; ticketTime = 30; bufferTime = 10; } 
      else { serviceTime = baseDuration; bufferTime = 10; }
    } else if (val === '2') {
      planText = `課程扣抵 (連續2堂 ${baseDuration*2}分)`;

      ticketCheck.checked = false; ticketCheck.disabled = true;
      ticketCheck.parentElement.style.opacity = "0.5"; ticketHint.style.display = "block";
      isTicket = false;
      serviceTime = baseDuration * 2; bufferTime = 20;
    }

    let totalOccupied = serviceTime + ticketTime + bufferTime;
    let showDuration = serviceTime + ticketTime;
    useTicket = isTicket;
    
    finalPlanDetailName = planText + (isTicket ? " + 結構調整抵用卷" : "");
    setDuration(totalOccupied, showDuration);
  }

  function updateSinglePlanLogic() {
    if(selectedPlan !== 'SINGLE') return;
    const select = document.getElementById('singlePlanSelect');
    const ticketCheck = document.getElementById('singleUseTicket');
    const ticketHint = document.getElementById('singleTicketHint');

    const val = select.value; 
    let isTicket = ticketCheck.checked;
    let serviceTime = 0, bufferTime = 0, ticketTime = 0;
    let planText = "";
    const hasTicket = (currentUser.ticketBalance > 0 || currentUser.tickets > 0);

    if (val === '50_1') {
      planText = "單次預約 (50分)";
      if(hasTicket) { ticketCheck.disabled = false; ticketCheck.parentElement.style.opacity = "1"; }
      ticketHint.style.display = "none";
      if (isTicket) { serviceTime = 50; ticketTime = 30; bufferTime = 10; } 
      else { serviceTime = 50; bufferTime = 10; }
    } else if (val === '50_2') {
      planText = "單次預約 (連續兩堂 100分)";
      ticketCheck.checked = false; ticketCheck.disabled = true;
      ticketCheck.parentElement.style.opacity = "0.5"; ticketHint.style.display = "block";
      isTicket = false;
      serviceTime = 100; bufferTime = 20;
    } else if (val === '80_1') {
      planText = "單次預約 (80分)";
      if(hasTicket) { ticketCheck.disabled = false; ticketCheck.parentElement.style.opacity = "1"; }
      ticketHint.style.display = "none";
      if (isTicket) { serviceTime = 80; ticketTime = 30; bufferTime = 10; } 
      else { serviceTime = 80; bufferTime = 10; }
    }

    let totalOccupied = serviceTime + ticketTime + bufferTime;
    let showDuration = serviceTime + ticketTime;
    useTicket = isTicket;
    finalPlanDetailName = planText + (isTicket ? " + 結構調整抵用卷" : "");
    setDuration(totalOccupied, showDuration);
  }

  function setDuration(occupied, display) {
    occupiedDuration = occupied; 
    displayDuration = display;   
    document.getElementById('finalDuration').innerText = display;
    document.getElementById('time-section').style.display = 'block';
    if(document.getElementById('datePicker').value) fetchSlots();
  }

  // --- 時段查詢 ---
  function fetchSlots() {
    const date = document.getElementById('datePicker').value;
    if(!date) return;
    
    const div = document.getElementById('slotsContainer');
    div.innerHTML = '<div style="grid-column:1/-1; text-align:center;">查詢中...</div>';

    sendRequest('getAvailableSlots', { date: date, duration: occupiedDuration }).then(res => {
      div.innerHTML = '';
      if(res.status === 'FULL') {
        div.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--danger);">本日已額滿</div>';
      } else if(!res.slots || res.slots.length === 0) {
        div.innerHTML = '<div style="grid-column:1/-1; text-align:center;">無符合時段</div>';
      } else {
        res.slots.forEach(t => {
          let el = document.createElement('div');
          el.className = 'time-slot';
          el.innerText = t;
          el.onclick = () => {
             document.querySelectorAll('.time-slot').forEach(x=>x.classList.remove('selected'));
             el.classList.add('selected');
             selectedTime = t;
             document.getElementById('confirmBtn').style.display = 'block';
          }
          div.appendChild(el);
        });
      }
    });
  }

  // --- 預約列表渲染 ---
  function renderBookingList() {
    const container = document.getElementById('bookingList');
    if (!container) return;

    document.getElementById('history-section').style.display = 'block';
    container.innerHTML = ''; 

    if (!currentBookingList || currentBookingList.length === 0) {
      container.innerHTML = '<div class="text-center" style="color:#666; padding:10px;">目前沒有預約</div>';
      return;
    }

    currentBookingList.sort((a, b) => new Date(a.start) - new Date(b.start));

    let html = '';
    currentBookingList.forEach(booking => {
      const isTemp = booking.id && booking.id.toString().startsWith('temp_');
      const statusLabel = isTemp ? '<span style="color:green; font-weight:bold; font-size:12px; margin-left:5px;">(新!)</span>' : '';
      
      let displayStart = booking.start.replace('T', ' ').substring(0, 16); 
      let displayEnd = booking.end ? booking.end : ""; 
      let timeString = displayEnd ? `${displayStart.split(' ')[1]} - ${displayEnd}` : displayStart;
      
      html += `
        <div class="booking-item" style="${isTemp ? 'border-left-color:#28a745;' : ''}">
          <div class="booking-info">
             <div class="booking-title">${booking.title} ${statusLabel}</div>
             <div class="booking-date">📅 ${displayStart.split(' ')[0]} <span style="margin-left:5px; color:#333;">${timeString}</span></div>
          </div>
          ${!isTemp ? `<button class="cancel-btn" onclick="cancelBooking('${booking.id}', '${displayStart}')">取消</button>` : ''}
        </div>
      `;
    });

    container.innerHTML = html;
  }

  // --- 讀取歷史紀錄 ---
  function loadBookingHistory() {
    const listDiv = document.getElementById('bookingList');
    if (currentBookingList.length === 0) {
      listDiv.innerHTML = '<div style="text-align:center; color:#666;">載入中...</div>';
    }
    document.getElementById('history-section').style.display = 'block';

    sendRequest('getBookingHistory', { phone: currentUser.phone }).then(res => {
      if(res.success) {
        currentBookingList = res.bookings;
        renderBookingList();
      } else {
        listDiv.innerHTML = '<div style="text-align:center; color:#666;">無法讀取紀錄</div>';
      }
    });
  }

  // --- 預約確認 (樂觀更新) ---
  function submitBooking() {
    if (!selectedTime) {
      Swal.fire('提示', '請先選擇一個時間時段', 'warning');
      return;
    }
    
    const dateStr = document.getElementById('datePicker').value;
    // 格式： 2025新年優惠... (1堂 50分)
    const realCourseName = `${currentUser.planName || '課程'} (1堂 ${currentUser.parsedDuration}分)`;

    const reqData = {
      date: dateStr,
      time: selectedTime,
      duration: occupiedDuration,
      name: currentUser.name,
      phone: currentUser.phone,
      lineUserId: lineUserId,
      plan: selectedPlan,
      customPlanName: finalPlanDetailName || selectedPlan, // 這是 "課程扣抵..."
      realCourseName: realCourseName, // 這是 "2025新年優惠..."
      useTicket: useTicket
    };
    Swal.fire({
      title: '確認預約資訊',
      html: `
        <div style="text-align:left; font-size:15px; line-height:1.6;">
          <p><strong>日期：</strong>${reqData.date}</p>
          <p><strong>時間：</strong>${reqData.time} (${displayDuration}分鐘)</p>
          <p><strong>方案：</strong>${reqData.customPlanName}</p>
        </div>
      `,
      icon: 'info',
      showCancelButton: true,
      confirmButtonText: '確定預約',
      cancelButtonText: '取消',
      confirmButtonColor: '#246A53',
      showLoaderOnConfirm: true,
      preConfirm: async () => {
        return sendRequest('createBooking', reqData);
      },
      allowOutsideClick: () => !Swal.isLoading()
    }).then((result) => {
      if (result.isConfirmed && result.value.success) {
        
        // 1. 樂觀更新列表
        let endH = parseInt(reqData.time.split(':')[0]);
        let endM = parseInt(reqData.time.split(':')[1]) + parseInt(displayDuration);
        while (endM >= 60) { endH++; endM -= 60; }
        const endTimeStr = `${endH.toString().padStart(2, '0')}:${endM.toString().padStart(2, '0')}`;

        const newTempBooking = {
          id: 'temp_' + Date.now(),
          title: reqData.customPlanName, // 這裡顯示 "課程扣抵 (1堂 50分)..." 而不是 "[預約] 名字"
          start: `${reqData.date} ${reqData.time}`,
          end: endTimeStr
        };

        currentBookingList.push(newTempBooking);
        renderBookingList();

        Swal.fire({
          title: '預約成功！',
          text: '您的預約已新增至列表',
          icon: 'success',
          timer: 2000,
          showConfirmButton: false
        });

        // 2. 重置選單 (修正問題1)
        resetSelection();
        
        // 3. 預約成功後清除會員快取 (因為點數可能變動)
        localStorage.removeItem('vip_user_' + currentUser.phone);

      } else if (result.isConfirmed && !result.value.success) {
        Swal.fire('預約失敗', result.value.error || '發生未知錯誤', 'error');
      }
    });
  }

  // --- 【修正】取消預約：從快取移除 + 重繪 ---
  function cancelBooking(eventId, timeStr) {
    Swal.fire({
      title: '取消預約',
      text: `確定要取消 ${timeStr} 的預約嗎？`,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#A73520',
      cancelButtonColor: '#3085d6',
      confirmButtonText: '是的，取消它',
      cancelButtonText: '保留'
    }).then((result) => {
      if (result.isConfirmed) {
        sendRequest('cancelBooking', {
          eventId: eventId,
          phone: currentUser.phone,
          name: currentUser.name,
          lineUserId: lineUserId
        }).then(res => {
          if(res.success) { 
            // 1. 直接從本地陣列移除 (不用等 loadBookingHistory)
            currentBookingList = currentBookingList.filter(b => b.id !== eventId);
            
            // 2. 重新渲染
            renderBookingList();

            Swal.fire({
              title: '已取消',
              text: '您的預約已成功取消',
              icon: 'success',
              confirmButtonColor: '#246A53'
            });

            // 3. 取消成功後清除會員快取 (因為點數通常會退回)
            localStorage.removeItem('vip_user_' + currentUser.phone);
            
          } else { 
            Swal.fire('取消失敗', res.error, 'error'); 
          }
        });
      }
    });
  }
</script>
